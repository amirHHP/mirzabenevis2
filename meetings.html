<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Logs</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="meetings.css" rel="stylesheet">
</head>

<body>
    <div class="navbar">
        <div class="navbar-left">
            <div class="navbar-logo">
                <img src="images/128-AutoMeetingLog.png" alt="Logo">
            </div>
            <div id="context-info">
                <span class="badge context-label">Meeting Logs</span>
            </div>
        </div>
        <div class="navbar-right">
        </div>
    </div>

    <div class="main-container">
        <div class="container">
            <div class="meeting-list">
                <div id="meeting-list"></div>
            </div>
            <div id="captions" hidden></div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-describedby="deleteModalDescription" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Delete Meeting</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="meeting-info mb-3">
                        <p class="mb-2"><strong>Meeting Title:</strong><br><span id="deleteMeetingTitle" class="text-break"></span></p>
                        <p class="mb-0"><strong>Start Time:</strong><br><span id="deleteMeetingTime"></span></p>
                    </div>
                    <div class="alert alert-warning mb-0" id="deleteModalDescription">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        This action cannot be undone.
                    </div>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-link" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDelete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.slim.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="meetings.js" type="module"></script>
</body>

</html>
